# Nginx reverse-proxy config for Green-Thumb API
# Place in /etc/nginx/sites-available/greenthumb.conf
# Then: sudo ln -s /etc/nginx/sites-available/greenthumb.conf /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name greenthumb.dnd-dad.com;

    # Redirect HTTP to HTTPS (enable after you have TLS certificates)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:4041;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Longer timeouts for SSE/websocket endpoints
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Stub for status page
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}

